<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>清分规则配置</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="sidebar">
        <h2>票务清分系统</h2>
        <ul>
            <li><a href="/">首页</a></li>
            <li><a href="data.html">票务数据管理</a></li>
            <li><a href="rules.html">清分规则配置</a></li>
            <li><a href="result.html">清分结果展示</a></li>
        </ul>
    </div>

    <div class="main">
        <div class="header">
            <h1>清分规则配置</h1>
        </div>

        <div class="panel">
            <h3>票价规则</h3>
            <p>0 - 3 公里：2 元</p>
            <p>3 - 6 公里：3 元</p>
            <p>6 - 10 公里：4 元</p>
            <p>10 公里以上：5 元</p>

            <h3>清分模式</h3>
            <select>
                <option>最短路径清分</option>
                <option>多路径概率清分</option>
            </select>

            <h3>换乘贡献系数</h3>
            <input type="text" value="1.1">

            <h3 style="margin-top: 20px;">规则说明</h3>
            <p>1. 单次交易票价根据乘客实际最短路径总里程分段计价。</p>
            <p>2. 涉及换乘的交易，按各线路承担的里程比例进行清分。</p>
            <p>3. 换乘站可按换乘贡献系数进行适当加权。</p>
            <p>4. 异常交易（如无出站、超时）可按异常规则单独处理。</p>

            <br>
            <button onclick="saveRule()">保存规则</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
